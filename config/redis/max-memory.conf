### REDIS MAX MEMORY BY WEBSTACKUP
## Limit Redis RAM usage to 2 GB. Without a limit, Redis can eat up
## all the RAM of the server and get OOM-killed.
##
## When the limit is reached, Redis evicts the least recently used keys
## (cache-like behavior) instead of erroring out on writes
## (`noeviction`, the upstream default).
##
## Don't forget to RESTART the service!
##
## sudo curl -Lo /etc/redis/redis.conf.d/30-webstackup-max-memory.conf https://github.com/TurboLabIt/webstackup/raw/refs/heads/master/config/redis/max-memory.conf && sudo service redis-server restart
##
## 📚 https://redis.io/docs/latest/develop/reference/eviction/

maxmemory 2gb
maxmemory-policy allkeys-lru
