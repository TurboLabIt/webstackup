### REDIS DISABLE PERSISTENCE BY WEBSTACKUP
## Turn Redis into a pure in-memory cache: no RDB snapshots, no AOF.
## No disk I/O, no dump files on disk. All data is LOST on restart!
## Perfect for cache and sessions, unsuitable as a primary datastore.
##
## Don't forget to RESTART the service!
##
## sudo curl -Lo /etc/redis/redis.conf.d/30-webstackup-disable-persistence.conf https://github.com/TurboLabIt/webstackup/raw/refs/heads/master/config/redis/disable-persistence.conf && sudo service redis-server restart
##
## 📚 https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/

## disable RDB snapshots
save ""

## disable the Append Only File (explicit, it's already the upstream default)
appendonly no
