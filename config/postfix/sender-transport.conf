## SENDER-DEPENDENT TRANSPORT MAP BY WEBSTACKUP
# https://github.com/TurboLabIt/webstackup/blob/master/config/postfix/sender-transport.conf
#
# Wired in via main.cf_extras.conf:
#   sender_dependent_default_transport_maps = regexp:/etc/postfix/sender-transport
#
# Postfix uses an empty envelope sender (`MAIL FROM: <>`) for every DSN /
# bounce message it generates. On a residential IP, those bounces never
# reach the original sender (remote MX servers refuse the connection),
# so they pile up in the queue and eventually trigger double-bounces
# back to postmaster.
# Discard them at the source: any outgoing message with an empty envelope
# sender is silently dropped.

/^$/    discard:
