## Listen on localhost only by WEBSTACKUP
#========================================
inet_interfaces = loopback-only


## Disable VRFY command by WEBSTACKUP
#=====================================
disable_vrfy_command = yes


## Redirects/aliases by WEBSTACKUP
#==================================
virtual_alias_maps = regexp:/etc/postfix/virtual-regexp


## Drop undeliverable bounces fast by WEBSTACKUP
#================================================
# Try once to send Delivery Status Notification only once,
# then discard, so bounces don't pile up in the queue and trigger
# double-bounces back to postmaster.
bounce_queue_lifetime = 0


## Send via 3rd-party relay server by WEBSTACKUP
#================================================
# relayhost = [smtp.gmail.com]:587
# relayhost = [smtp-mail.outlook.com]:587
# relayhost = [smtp-out.mailserver.it]:25
#smtp_use_tls = yes
#smtp_tls_CAfile = /etc/ssl/certs/ca-certificates.crt
#smtp_sasl_security_options =
#smtp_sasl_auth_enable = yes
#smtp_sasl_password_maps = hash:/etc/postfix/sasl_passwd


## Postfix integration with OpenDKIM by WEBSTACKUP
#==================================================
milter_protocol = 6
milter_default_action = accept
smtpd_milters = local:/opendkim/opendkim.sock
non_smtpd_milters = $smtpd_milters
