## EXTRASECURITY BY WEBSTACKUP
# Various tricks to (mildly) increase security.

## Bad bots — default list in config/nginx/02_global_http_level.conf (map $http_user_agent $wsuBadBots)
# Per-vhost override: set $wsuBadBots (+ optional custom if/set list) BEFORE including this file
if ($wsuBadBots) { return 403; }

## HSTS (requires a valid HTTPS certificate)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

## Deny all attempts to access hidden files such as .htaccess, .htpasswd, .DS_Store (Mac) excepted .well-known directory.
# Keep logging the requests to parse later (or to pass to firewall utilities such as fail2ban)
location ~ /\.(?!well-known\/) {
  deny all;
  return 404;
}

## Deny access to any files with a .php extension in the uploads directory for the single site
location /wp-content/uploads {
  location ~ \.php$ {
    return 403;
  }
}

## Disallow embedding of this site. All iframes etc. will be blank, or contain a browser specific error page.
# https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
# we CANNOT be stricter: it would break scripts loaded via CDN or Tag Managers
add_header Content-Security-Policy "frame-ancestors 'self'" always;

## Disable embedding in SWFs (Flash) and PDFs
# It has almost no effect on modern web standards, but it is often included in "checklist" security audits.
add_header X-Permitted-Cross-Domain-Policies "none" always;

## Prevents an attacker from iframing the content of your site into others.
# https://docs.sucuri.net/warnings/hardening/security-headers-x-frame-options/
add_header X-Frame-Options "SAMEORIGIN" always;

## Prevent the browser from guessing the file type
add_header X-Content-Type-Options "nosniff" always;

## Send the full referrer when browsing internally. Just the domain otherwise
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

## Force all the cookies set to be HTTPOnly (no-JS) and HTTPS-only (no-HTTP)
# https://www.php.net/manual/en/function.setcookie
proxy_cookie_path / "/; HTTPOnly; Secure";

location ~* ^/(wp-config.php|.htaccess) {
  return 403;
}
