### GENERAL HTTP DIRECTIVES
## The default webstackup installation
## load these into the http {} block
#

## Handle huge maps
map_hash_bucket_size 2048;
map_hash_max_size 2048;

## You can then choose to exclude 2xx's from logging
map $status $abnormal {
    ~^(200|304) 0;
    default 1;
}

##
map $http_user_agent $is_google_lighthouse {
  "~*Lighthouse" 1;
  default 0;
}

map $request_uri $wsu_auth_realm {
  ~*graphql  "off";
  default    "Restricted access | WEBSTACKUP HTTP AUTH";
}

## WebSocket upgrade: map the client's Upgrade header to the right Connection value.
## Referenced by 25_reverse-proxy.conf so proxied apps (Vite HMR, SSE, app WebSockets)
## can open wss://. https://nginx.org/en/docs/http/websocket.html
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

## Bad-bots list: sets the $wsuBadBots verdict (1 = block), enforced by 70_security.conf
# Per-vhost override, BEFORE including 70_security.conf:
#   set $wsuBadBots 0;   # disables the default list. Optionally follow with a custom list:
#   if ($http_user_agent ~* "SomeBot|OtherBot") { set $wsuBadBots 1; }
map $http_user_agent $wsuBadBots {
  "~*SemrushBot|Semrush|AhrefsBot|MJ12bot|YandexBot|YandexImages|MegaIndex.ru|BLEXbot|BLEXBot|ZoominfoBot|YaK|VelenPublicWebCrawler|SentiBot|Vagabondo|SEOkicks|SEOkicks-Robot|mtbot/|SeznamBot|DotBot|Cliqzbot|coccocbot|python|Scrap|SiteCheck-sitecrawl|MauiBot|GumGum|Clickagy|AspiegelBot|Yandex|TkBot|CCBot|Qwantify|MBCrawler|serpstatbot|AwarioSmartBot|Semantici|ScholarBot|proximic|MojeekBot|GrapeshotCrawler|IAScrawler|linkdexbot|contxbot|PlurkBot|PaperLiBot|BomboraBot|Leikibot|weborama-fetcher|NTENTbot|Screaming Frog SEO Spider|admantx-usaspb|Eyeotabot|VoluumDSP-content-bot|SirdataBot|adbeat_bot|TTD-Content|admantx|Nimbostratus-Bot|Mail.RU_Bot|Quantcastboti|Onespot-ScraperBot|Taboolabot|Baidu|Jobboerse|VoilaBot|Sogou|Jyxobot|Exabot|ZGrab|Proximi|Sosospider|Accoona|aiHitBot|Genieo|BecomeBot|ConveraCrawler|NerdyBot|OutclicksBot|findlinks|JikeSpider|Gigabot|CatchBot|Huaweisymantecspider|Offline Explorer|SiteSnagger|TeleportPro|WebCopier|WebReaper|WebStripper|WebZIP|Xaldon_WebSpider|BackDoorBot|AITCSRoboti|Arachnophilia|BackRub|BlowFishi|perl|CherryPicker|CyberSpyder|EmailCollector|Foobot|GetURL|httplib|HTTrack|LinkScan|Openbot|Snooper|SuperBot|URLSpiderPro|MAZBot|EchoboxBot|SerendeputyBot|LivelapBot|linkfluence.com|TweetmemeBot|LinkisBot|CrowdTanglebot|Bytespider|TikTokSpider" 1;
  default 0;
}

## rate-limiting
# https://www.nginx.com/blog/rate-limiting-nginx/
limit_req_zone $binary_remote_addr zone=webstackuplimiter:10m rate=150r/s;

## max request size (needed for CMS uploads) - sync with config/php/php-custom.ini
client_max_body_size 100m;

## prepare lowercase URL function
# requires `sudo apt install nginx-extras -y`
#perl_set $uri_lowercase 'sub {
