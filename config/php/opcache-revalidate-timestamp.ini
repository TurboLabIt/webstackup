;; Re-enable OPCACHE timestamp revalidation (WordPress, PrestaShop, ..) by WEBSTACKUP
; https://github.com/TurboLabIt/webstackup
;
;; 🚨 WARNING 🚨
;
; This file belongs to Webstackup
; DO NOT EDIT DIRECTLY - If you do, you'll loose your changes!


; detect changed PHP files (plugin/core self-updates) without a php-fpm restart
opcache.validate_timestamps = 1
opcache.revalidate_freq = 5
opcache.revalidate_path = 1
opcache.use_cwd = 1


; some plugins/modules rely on docblocks and real file_exists() checks
opcache.save_comments = 1
opcache.enable_file_override = 0


; JIT: little to no benefit for these apps, can crash with some plugins/extensions
opcache.jit = disable
opcache.jit_buffer_size = 0
